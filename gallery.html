<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Browse Items</title>
</head>
<body>

    <div class="phone-container">
        
        <header class="gallery-header">
            <div class="logo-text">MapuaWhere</div>
            <div class="menu-icon">☰</div>
        </header>

        <nav class="filter-scroll">
            <button class="chip active">All</button>
            <button class="chip">Electronics</button>
            <button class="chip">Documents</button>
            <button class="chip">Essentials</button>
            <button class="chip">Other</button>
        </nav>

        <main class="item-grid-container">
            <a href="#" class="grid-item">
                <div class="img-box"><span>✕</span></div>
                <div class="item-details">
                    <span class="name">Blue Backpack</span>
                    <span class="loc">North Building</span>
                </div>
            </a>

            <a href="#" class="grid-item">
                <div class="img-box"><span>✕</span></div>
                <div class="item-details">
                    <span class="name">Silver Watch</span>
                    <span class="loc">Gym Lobby</span>
                </div>
            </a>
            
            <a href="#" class="grid-item">
                <div class="img-box"><span>✕</span></div>
                <div class="item-details">
                    <span class="name">Car Keys</span>
                    <span class="loc">South Parking</span>
                </div>
            </a>
        </main>

        <footer class="gallery-footer">
            Footer Text
        </footer>
    </div>

</body>
</html>
