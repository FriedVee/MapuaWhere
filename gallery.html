<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Items - MapuaWhere</title>

    <!-- Bootstrap (Requirement) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="phone-container">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <a href="index.html">Home</a>
        <a href="gallery.html">Browse Items</a>
        <a href="form.html">Report Item</a>
        <a href="#">Help</a>
    </div>

    <header class="gallery-header">
        <div class="logo-text">MapuaWhere</div>
        <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    </header>

    <!-- Filters -->
    <nav class="filter-scroll">
        <button class="chip active">All</button>
        <button class="chip">Electronics</button>
        <button class="chip">Documents</button>
        <button class="chip">Essentials</button>
        <button class="chip">Other</button>
    </nav>

    <!-- Bootstrap Grid -->
    <main class="container p-0">
        <div class="row g-3">

            <div class="col-6">
                <a href="item.html" class="grid-item">
                    <div class="img-box">📱</div>
                    <div class="item-details">
                        <span class="name">iPhone 13</span>
                        <span class="loc">Library</span>
                    </div>
                </a>
            </div>

            <div class="col-6">
                <a href="item.html" class="grid-item">
                    <div class="img-box">🎒</div>
                    <div class="item-details">
                        <span class="name">Black Backpack</span>
                        <span class="loc">Main Hall</span>
                    </div>
                </a>
            </div>

            <div class="col-6">
                <a href="item.html" class="grid-item">
                    <div class="img-box">🪪</div>
                    <div class="item-details">
                        <span class="name">Student ID</span>
                        <span class="loc">Cafeteria</span>
                    </div>
                </a>
            </div>

            <div class="col-6">
                <a href="item.html" class="grid-item">
                    <div class="img-box">⌚</div>
                    <div class="item-details">
                        <span class="name">Smart Watch</span>
                        <span class="loc">Gym</span>
                    </div>
                </a>
            </div>

        </div>
    </main>

    <footer class="gallery-footer">
        © 2026 MapuaWhere
    </footer>

</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("active");
}
</script>

</body>
</html>
