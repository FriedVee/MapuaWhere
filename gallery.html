<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>MapúaWhere — Gallery</title>
</head>
<body>

  <div class="phone-container">

    <!-- SIDEBAR -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  
  <div class="sidebar-header">
    <div class="sidebar-logo-wrap">
      <span class="sidebar-logo-text">MapúaWhere</span>
    </div>
    <p class="sidebar-tagline">Mapúa University Makati — Lost & Found</p>
  </div>
  
  <nav class="sidebar-nav">
    <p class="sidebar-section-label">Account</p>
    <button class="sidebar-link" onclick="showToast('Sign In coming soon!'); closeSidebar()">
      <span class="s-icon">🔐</span> Sign In / Sign Out
    </button>
    <button class="sidebar-link" onclick="showToast('Account settings coming soon!'); closeSidebar()">
      <span class="s-icon">👤</span> Account
    </button>
    
    <div class="sidebar-divider"></div>
    
    <p class="sidebar-section-label">Navigate</p>
    <a href="index.html" class="sidebar-link"><span class="s-icon">🏠</span> Home</a>
    <a href="gallery.html" class="sidebar-link"><span class="s-icon">🗂️</span> Gallery</a>
    <a href="foundform.html" class="sidebar-link"><span class="s-icon">📌</span> Report Item</a>
    
    <div class="sidebar-divider"></div>
    
    <p class="sidebar-section-label">Support</p>
    <button class="sidebar-link" onclick="showToast('Help page coming soon!'); closeSidebar()">
      <span class="s-icon">❓</span> Need Help
    </button>
  </nav>
  
  <div class="sidebar-footer">© MapuaWhere 2026</div>
</aside>

    <!-- =============================================
         PERSISTENT HEADER
         ============================================= -->
<header class="app-header">
  <a href="index.html" class="header-logo">
    <img src="MapuaWhere_Logo.png" alt="MapúaWhere" style="height: 50px; width: auto;">
  </a>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleMenu()">☰</button>
  </div>
</header>

    <!-- =============================================
         GALLERY MAIN CONTENT
         Contribution: HONEY & IVY — Gallery page UI,
         filter chips, and 2-column grid layout
         ============================================= -->
    <main class="page-content">

      <div class="section-header" style="margin-bottom:12px;">
        <h2 class="section-title">Gallery</h2>
      </div>

      <!-- Filter Chips — interactive, scroll horizontally -->
      <nav class="filter-scroll" aria-label="Filter by category">
        <button class="chip active" data-category="All">All</button>
        <button class="chip" data-category="Electronics">📱 Electronics</button>
        <button class="chip" data-category="Documents">📄 Documents</button>
        <button class="chip" data-category="Wallets/Keys/IDs">🔑 Essentials</button>
        <button class="chip" data-category="Clothing/Accessories">👕 Clothing</button>
        <button class="chip" data-category="Other">📦 Other</button>
      </nav>

      <!-- Item Grid — populated by script.js → loadGallery() -->
      <main class="item-grid-container" id="gallery-grid" aria-live="polite">
        <!-- Loading skeletons -->
        <div class="grid-item">
          <div class="img-box skeleton"></div>
          <div class="grid-item-details">
            <div class="skeleton" style="height:13px;width:80px;border-radius:6px;"></div>
            <div class="skeleton" style="height:10px;width:60px;border-radius:6px;margin-top:5px;"></div>
          </div>
        </div>
        <div class="grid-item">
          <div class="img-box skeleton"></div>
          <div class="grid-item-details">
            <div class="skeleton" style="height:13px;width:70px;border-radius:6px;"></div>
            <div class="skeleton" style="height:10px;width:50px;border-radius:6px;margin-top:5px;"></div>
          </div>
        </div>
        <div class="grid-item">
          <div class="img-box skeleton"></div>
          <div class="grid-item-details">
            <div class="skeleton" style="height:13px;width:90px;border-radius:6px;"></div>
            <div class="skeleton" style="height:10px;width:65px;border-radius:6px;margin-top:5px;"></div>
          </div>
        </div>
        <div class="grid-item">
          <div class="img-box skeleton"></div>
          <div class="grid-item-details">
            <div class="skeleton" style="height:13px;width:75px;border-radius:6px;"></div>
            <div class="skeleton" style="height:10px;width:55px;border-radius:6px;margin-top:5px;"></div>
          </div>
        </div>
      </main>

    </main>

    <!-- PERSISTENT BOTTOM NAV — Messages removed, Browse→Gallery -->
    <nav class="bottom-nav" aria-label="Main navigation">
      <a href="index.html" class="nav-item">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
      </a>
      <a href="gallery.html" class="nav-item active" aria-current="page">
        <span class="nav-icon">🗂️</span>
        <span>Gallery</span>
      </a>
      <a href="foundform.html" class="nav-item">
        <span class="nav-icon">➕</span>
        <span>Report</span>
      </a>
    </nav>

    <!-- LICENSE FOOTER — updated text -->
    <footer class="license-footer">© MapuaWhere 2026</footer>

  </div><!-- /.phone-container -->

  <script src="script.js"></script>
</body>
</html>
