<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="phone-container">
        <input type="checkbox" id="menu-toggle">
        
        <label for="menu-toggle" class="toggle">
            <span class="common top_line"></span>
            <span class="common middle_line"></span>
            <span class="common bottom_line"></span>
        </label>

        <nav class="sidebar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="form.html">Report Found</a></li>
                <li><a href="form2.html">Report Lost</a></li>
            </ul>
        </nav>

        <div class="form-container">
            <div class="tabs">
                <div class="tab active">Report Found</div>
                <div class="tab" onclick="window.location.href='form2.html'">Report Lost</div>
            </div>

            <div class="upload-box">
                <div class="camera-icon">📷</div>
                <input type="file" id="itemPhoto" style="display:none;" accept="image/*">
                <p>Upload Photo</p>
            </div>

            <select class="input-field" id="category">
                <option disabled selected>Select Category Found</option>
                <option>Electronics</option>
                <option>Pets/Animals</option>
                <option>Wallets/Keys/IDs</option>
                <option>Clothing/Accessories</option>
            </select>

            <input type="text" class="input-field" id="item-name" placeholder="General Item Name (e.g. Silver Watch)">
            <input type="text" class="input-field" id="location" placeholder="Where was this found? (Location/Building)">
            <textarea class="input-field multi-line" id="description" placeholder="General description (Brand, color, etc.). Note: Keep one unique detail secret to verify the owner."></textarea>
            <button class="submit-btn" id="submitBtn">Post Found Item</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
