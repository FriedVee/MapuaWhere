<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>MapúaWhere — Item Details</title>
</head>
<body>

  <main class="phone-container">
    <header class="app-header">
      <a href="index.html" class="header-logo">
        <img src="MapuaWhere_Logo.png" alt="MapúaWhere" style="height: 50px;">
      </a>
      <button class="icon-btn" onclick="toggleMenu()">☰</button>
    </header>

    <!-- =============================================
         FOUND FORM PAGE CONTENT
         Contribution: 
         HONEY — Item Details page UI, map integration, and activity history
         IVY - Image-mapping, item details table, activity history
         ============================================= -->

    <article class="page-content">
      <section class="details-header">
        <a href="javascript:history.back()" class="back-btn">←</a>
        <h1>Item Details</h1>
      </section>

      <div class="status-row" id="status-row">
        <span class="status-pill status-pill-lost" id="status-lost">Lost</span>
        <span class="status-pill status-pill-found" id="status-found">Found</span>
      </div>

      <div class="detail-img-hero" id="detail-img-hero"><span>📷</span></div>

      <section class="detail-card">
  <h2 class="detail-item-name" id="detail-name">Loading...</h2>
  
      <table class="detail-info-table">
        <tbody>
          <tr>
            <th scope="row">📍 Location</th>
            <td id="detail-location">---</td>
          </tr>
          <tr>
            <th scope="row">🏷️ Category</th>
            <td id="detail-category">---</td>
          </tr>
          <tr>
            <th scope="row">🕐 Reported</th>
            <td id="detail-time">---</td>
          </tr>
        </tbody>
      </table>

      <div class="detail-description" id="detail-description">
        Loading description...
      </div>
    </section>
 

 <section class="map-section">
    <div class="map-section-header">
        <span>🗺️</span>
        <span class="map-section-title">CAMPUS PREMISES MAP</span>
    </div>

   <div class="map-container" id="map-viewport">
    <img src="mapua-map.png" id="mapua-image" usemap="#image-map" alt="Mapúa Makati Map" class="map-image" style="width: 1200px !important; max-width: none !important;">

    <map name="image-map">
        <area target="_blank" alt="LIBRARY (2ND FLOOR)" title="LIBRARY" href="https://maps.app.goo.gl/CTmWhagmGktXTQKJ8" coords="544,684,876,897" onclick="syncMapLocation('LIBRARY (2ND FLOOR)', event);" shape="rect">
        <area target="_blank" alt="BACK ENTRANCE" title="BACK ENTRANCE" href="https://maps.app.goo.gl/cNARNxqNQ27auLBLA" coords="1223,326,1160,267" onclick="syncMapLocation('BACK ENTRANCE', event);" shape="rect">
        <area target="_blank" alt="CR (2ND FLOOR)" title="CR (2ND FLOOR)" href="https://maps.app.goo.gl/CTmWhagmGktXTQKJ8" coords="1974,949,1842,625" onclick="syncMapLocation('CR (2ND FLOOR)', event);" shape="rect">
        <area target="_blank" alt="CR" title="CR" href="https://maps.app.goo.gl/CTmWhagmGktXTQKJ8" coords="1160,725,1051,593" onclick="syncMapLocation('CR', event);" shape="rect">
        <area target="_blank" alt="CAFETERIA" title="CAFETERIA" href="https://maps.app.goo.gl/yjRR1QVnZGzvPvnu5" coords="656,209,937,257,891,543,805,547,801,679,640,679,535,686,289,633,300,625,347,454,610,495" shape="poly" onclick="syncMapLocation('CAFETERIA', event);">
    </map>
</div>

    <p class="map-caption">
        <span class="pin-icon">📍</span> 
        <span id="map-caption-text">Tap a room to center map & open link</span>
    </p>
</section>

      <section class="section-header">
          <h2 class="section-title">Item History</h2>
      </section>
      <section class="detail-card">
          <ul id="activity-history-list" class="activity-list-ul">
              <li>Loading history...</li>
          </ul>
      </section>

      
      <div class="action-footer">
        <button class="cta-btn" id="contact-btn">Message Reporter</button>
      </div>
    </article>

    <nav class="bottom-nav" aria-label="Main navigation">
      <a href="index.html" class="nav-item active" aria-current="page">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
      </a>
      <a href="gallery.html" class="nav-item">
        <span class="nav-icon">🗂️</span>
        <span>Gallery</span>
      </a>
      <a href="foundform.html" class="nav-item">
        <span class="nav-icon">➕</span>
        <span>Report</span>
      </a>
    </nav>

    <footer class="license-footer">© MapuaWhere 2026</footer>

    
  </main>

  <script src="script.js"></script>
</body>
</html>
