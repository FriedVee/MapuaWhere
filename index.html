<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="phone-container">
        <header>
            <div class="logo">
                <img src="img/MapuaWhere_logo.png">
            </div>
            <div class="menu-icon">☰</div>
        </header>

        <div class="search-bar">Search...</div>

        <div class="actions">
            <div class="btn">I LOST</div>
            <div class="btn">I FOUND</div>
        </div>

        <div class="recent-title">Recent Activity</div>

        <!-- Activity Item 1 -->
        <div class="item-card">
            <div class="item-img-placeholder">☒</div>
            <div class="item-info">
                <span class="item-name">Water bottle</span>
                <span class="item-meta">2 mins ago</span>
                <span class="item-meta">📍 Library</span>
            </div>
        </div>

        <!-- Activity Item 2 -->
        <div class="item-card">
            <div class="item-img-placeholder">☒</div>
            <div class="item-info">
                <span class="item-name">Charging cable</span>
                <span class="item-meta">2 mins ago</span>
                <span class="item-meta">📍 Cafe</span>
            </div>
        </div>
    </div>
</body>
</html>
