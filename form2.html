<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Lost Item - MapuaWhere</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="phone-container">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <a href="index.html">Home</a>
        <a href="gallery.html">Browse Items</a>
        <a href="form.html">Report Item</a>
        <a href="#">Help</a>
    </div>

    <header>
        <div class="logo-text">MapuaWhere</div>
        <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    </header>

    <div class="form-container">

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab" onclick="window.location.href='form.html'">Report Found</div>
            <div class="tab active">Report Lost</div>
        </div>

        <!-- Upload -->
        <div class="upload-box" onclick="document.getElementById('itemPhoto').click();">
            <div class="camera-icon">📷</div>
            <p>Upload Reference Photo</p>
            <input type="file" id="itemPhoto" style="display:none;" accept="image/*">
        </div>

        <!-- Category -->
        <select class="input-field">
            <option disabled selected>Select Item Category</option>
            <option>Electronics</option>
            <option>Pets</option>
            <option>Wallets/Keys</option>
            <option>Other</option>
        </select>

        <!-- Item Name -->
        <input type="text" class="input-field" placeholder="Item Name (e.g. Blue Backpack)">

        <!-- Last Seen -->
        <input type="text" class="input-field" placeholder="Last Seen Location / Area">

        <!-- Description -->
        <textarea class="input-field multi-line"
            placeholder="Describe unique markings, brand, or contents..."></textarea>

        <!-- Submit -->
        <button class="submit-btn" onclick="alert('Lost item report submitted! (Demo only)')">
            Submit Report
        </button>

    </div>

    <!-- Footer -->
    <div class="gallery-footer">
        © 2026 MapuaWhere
    </div>

</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("active");
}
</script>

</body>
</html>
