<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-container">
    <div class="tabs">
        <div class="tab">Report Found</div>
        <div class="tab active">Report Lost</div>
    </div>

    <div class="upload-box">
        <div class="camera-icon">📷</div>
        <input type="file" id="itemPhoto" style="display:none;" accept="image/*">
        <p>Upload Reference Photo</p>
    </div>

    <select class="input-field">
        <option disabled selected>Select Item Category</option>
        <option>Electronics</option>
        <option>Pets</option>
        <option>Wallets/Keys</option>
        <option>Other</option>
    </select>

    <input type="text" class="input-field" placeholder="Item Name (e.g. Blue Backpack)">
    
    <input type="text" class="input-field" placeholder="Last Seen Location/Area">

    <textarea class="input-field multi-line" placeholder="Describe unique markings, brand, or contents..."></textarea>

    <button class="submit-btn">Post Lost Report</button>
</div>
</body>
</html>
