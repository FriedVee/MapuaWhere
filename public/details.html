<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Item Details</title>
</head>
<body>
    <div class="phone-container">
        <div class="status-tabs">
            <div class="s-tab" id="status-lost">LOST</div>
            <div class="s-tab" id="status-found">FOUND</div>
            <div class="s-tab" id="status-resolved">RESOLVED</div>
        </div>

        <div class="details-container">
    <div class="image-header">
        <img id="detail-image" src="" alt="Item Image" style="width:100%; border-radius: 15px;">
    </div>
    
        <h2 id="detail-name">Loading...</h2>
        <p><strong>Status:</strong> <span id="detail-status"></span></p>
        <p><strong>Category:</strong> <span id="detail-category"></span></p>
        <p><strong>Location:</strong> <span id="detail-location"></span></p>
        <p><strong>Date Reported:</strong> <span id="detail-time"></span></p>
        
        <div class="description-box">
            <h3>Description</h3>

            
            <!-- add status table here>
            <table><th></th><tr><tr></table>
            -->
            <p id="detail-description"></p>
        </div>
        
        <button class="contact-btn">Message Reporter</button>
    </div>

    <script src="script.js"></script>
        <div class="map-container">
            <div class="map-box">
                <img src="img/map-placeholder.png" alt="Floor Map" style="width:100%;">
                <div class="map-pin">📍</div>
            </div>
            <p id="detail-location" style="text-align: center; font-weight: bold;"></p>
            <!----Report List(style w/ boothstrap) <dl><dt><dd></dd></dt></dl>----->
        </div>
    </div>
</body>
</html>
