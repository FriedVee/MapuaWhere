<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Item Details</title>
</head>
<body>
    <div class="phone-container">
        <div class="status-tabs">
            <div class="s-tab" id="status-lost">LOST</div>
            <div class="s-tab" id="status-found">FOUND</div>
            <div class="s-tab" id="status-resolved">RESOLVED</div>
        </div>

        <div class="detail-img-box" id="item-image">
            <span>☒</span>
        </div>

        <div class="detail-info">
            <h2 id="detail-name">Item Name</h2>
            <p id="detail-description">Loading description...</p>
        </div>

        <div class="map-container">
            <div class="map-box">
                <img src="img/map-placeholder.png" alt="Floor Map" style="width:100%;">
                <div class="map-pin">📍</div>
            </div>
            <p id="detail-location" style="text-align: center; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        async function loadDetails() {
            // 1. Get the ID from the URL (?id=123)
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            // 2. Fetch all items and find the one that matches the ID
            const response = await fetch('/api/items');
            const items = await response.json();
            const item = items.find(i => i.id == id);

            if (item) {
                document.getElementById('detail-name').innerText = item.itemName;
                document.getElementById('detail-description').innerText = item.description;
                document.getElementById('detail-location').innerText = item.location;
                
                // Show image if it exists
                if (item.image) {
                    document.getElementById('item-image').innerHTML = `<img src="${item.image}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">`;
                }

                // Highlight the correct status tab
                const statusId = `status-${item.status.toLowerCase()}`;
                const activeTab = document.getElementById(statusId);
                if (activeTab) activeTab.classList.add('active-status');
            }
        }
        window.onload = loadDetails;
    </script>
</body>
</html>
